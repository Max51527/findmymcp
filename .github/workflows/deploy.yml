name: Deploy to Cloudflare

# Auto-deploy on push to main:
#  - both workers (scraper, submit)
#  - the Astro Pages site
#
# Required GitHub repository secrets (Settings > Secrets and variables > Actions):
#  - CLOUDFLARE_API_TOKEN       (account-scoped, Workers Scripts:Edit + Pages:Edit + D1:Edit)
#  - CLOUDFLARE_ACCOUNT_ID      (eaddc4cc77d99dd397a62e5d5a1b6864)
#  - PUBLIC_SITE_URL            (e.g. https://findmymcp.fr)
#  - PUBLIC_CF_ANALYTICS_TOKEN
#  - PUBLIC_TURNSTILE_SITE_KEY
#
# To seed the worker runtime secrets (ANTHROPIC_API_KEY, GITHUB_PAT_FINDMYMCP,
# TURNSTILE_SECRET_KEY, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
# SCRAPER_TRIGGER_KEY), run the "Seed worker secrets" workflow once manually
# (workflow_dispatch in .github/workflows/seed-secrets.yml).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: workers/scraper/package-lock.json }
      - run: npm ci
        working-directory: workers/scraper
      - name: Deploy scraper
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: workers/scraper
        run: npx wrangler deploy

  deploy-worker-submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: workers/submit/package-lock.json }
      - run: npm ci
        working-directory: workers/submit
      - name: Deploy submit
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: workers/submit
        run: npx wrangler deploy

  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Build
        env:
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
          PUBLIC_CF_ANALYTICS_TOKEN: ${{ secrets.PUBLIC_CF_ANALYTICS_TOKEN }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}
        run: npm run build
      - name: Deploy Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name findmymcp --branch main

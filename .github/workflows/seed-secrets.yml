name: Seed worker secrets

# Manual one-shot workflow to push runtime secrets into the deployed Workers.
# Run after the workers exist (i.e. after the first successful deploy.yml run).
#
# Required GitHub repository secrets (in addition to CLOUDFLARE_*):
#  - ANTHROPIC_API_KEY
#  - GITHUB_PAT_FINDMYMCP        (the fine-grained PAT used by both workers
#                                 to read the repo + open PRs)
#  - SCRAPER_TRIGGER_KEY         (random 48-char hex)
#  - TURNSTILE_SECRET_KEY
#  - STRIPE_SECRET_KEY
#  - STRIPE_WEBHOOK_SECRET       (filled after creating the webhook in Stripe;
#                                 can be left as a dummy first, then re-run)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scraper-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: workers/scraper/package-lock.json }
      - run: npm ci
        working-directory: workers/scraper
      - name: Push scraper secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: workers/scraper
        run: |
          echo "${{ secrets.ANTHROPIC_API_KEY }}"     | npx wrangler secret put ANTHROPIC_API_KEY
          echo "${{ secrets.GITHUB_PAT_FINDMYMCP }}"  | npx wrangler secret put GITHUB_TOKEN
          echo "${{ secrets.SCRAPER_TRIGGER_KEY }}"   | npx wrangler secret put SCRAPER_TRIGGER_KEY

  submit-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: workers/submit/package-lock.json }
      - run: npm ci
        working-directory: workers/submit
      - name: Push submit secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: workers/submit
        run: |
          echo "${{ secrets.ANTHROPIC_API_KEY }}"     | npx wrangler secret put ANTHROPIC_API_KEY
          echo "${{ secrets.GITHUB_PAT_FINDMYMCP }}"  | npx wrangler secret put GITHUB_TOKEN
          echo "${{ secrets.TURNSTILE_SECRET_KEY }}"  | npx wrangler secret put TURNSTILE_SECRET_KEY
          echo "${{ secrets.STRIPE_SECRET_KEY }}"     | npx wrangler secret put STRIPE_SECRET_KEY
          echo "${{ secrets.STRIPE_WEBHOOK_SECRET }}" | npx wrangler secret put STRIPE_WEBHOOK_SECRET

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Astro check
        run: npm run check
      - name: Astro build
        run: npm run build

  workers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [scraper, submit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/${{ matrix.worker }}/package-lock.json
      - run: npm ci
        working-directory: workers/${{ matrix.worker }}
      - name: Typecheck worker
        run: npx tsc --noEmit
        working-directory: workers/${{ matrix.worker }}
